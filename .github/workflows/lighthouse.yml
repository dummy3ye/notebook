name: Lighthouse CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Install wait-on
              run: npm install -g wait-on

            - name: Lighthouse CI
              run: |
                npm run start &
                npx wait-on http://localhost:3000
                npm run lhci
              env:
                LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

